<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form practice</title>
</head>
<body>
    <form action="/action">
        <caption><h4>Registration form</h4></caption>
        <div><input type="text" placeholder="First Name" name="firstname">
        <input type="text" placeholder="lastname" name="lastname"></div>
        <div>
            <label for="gender">select gender</label>
            <select name="gender" id="gender">
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="others">others</option>
            </select>
        </div> 
        <div>
            Do you agree to all terms and services?
            <input type="checkbox" name="terms" id="terms_services">
            <label for="terms_services">Yes,I agree</label>
        </div>
        <button>Register</button>
    </form>
</body>
</html>
